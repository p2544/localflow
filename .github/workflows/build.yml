name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libasound2-dev \
            libssl-dev librsvg2-dev libayatana-appindicator3-dev pkg-config cmake
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Frontend typecheck + build
        run: npm ci && npm run build
      - name: Rust tests (rules tier, no models)
        env:
          # Bundled whisper bindings are generated on Linux — matches this runner.
          WHISPER_DONT_GENERATE_BINDINGS: "1"
        run: cargo test --workspace --no-default-features

  bundle:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest # x64 NSIS + MSI
            args: ""
          - os: macos-latest # Apple Silicon (arm64) DMG
            args: ""
          - os: macos-13 # Intel (x86_64) DMG
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake || true
      - run: npm ci
      - name: Build bundles
        run: npm run tauri build -- ${{ matrix.args }}
      - uses: actions/upload-artifact@v4
        with:
          name: localflow-${{ matrix.os }}
          path: |
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app
          if-no-files-found: warn
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/dmg/*.dmg
